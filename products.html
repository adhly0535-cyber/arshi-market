<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Arshi Market</title>

<style>
body{
  font-family: Arial;
  margin:0;
  padding-bottom:80px;
  background:#f5f5f5;
}
.country-name{
  background:#4CAF50;
  color:#fff;
  text-align:center;
  padding:8px;
  font-weight:bold;
}
.categories, .states{
  display:flex;
  gap:8px;
  padding:10px;
  background:#fff;
  overflow-x:auto;
}
.categories button, .states button{
  border:none;
  background:#eee;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}
.categories button.active,
.states button.active{
  background:#4CAF50;
  color:#fff;
}
.products{
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.product-card{
  background:#fff;
  padding:8px;
  border-radius:10px;
}
.product-images{
  display:flex;
  gap:4px;
}
.product-images img{
  width:32%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}
.price{
  color:#4CAF50;
  font-weight:bold;
}
.product-info{
  font-size:12px;
  color:#555;
}
.whatsapp-number{
  font-size:12px;
  margin-top:4px;
  color:#333;
  word-break:break-all;
}
.whatsapp-btn{
  width:100%;
  margin-top:6px;
  background:#25D366;
  color:#fff;
  border:none;
  padding:6px;
  border-radius:6px;
  cursor:pointer;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:6px 0;
  border-top:1px solid #ccc;
}
.bottom-nav button{
  background:none;
  border:none;
  font-size:13px;
}
.add-product-fab{
  position:fixed;
  bottom:90px;
  left:20px;
  background:#4CAF50;
  color:#fff;
  border:none;
  width:55px;
  height:55px;
  border-radius:50%;
  font-size:28px;
}
.image-viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.image-viewer img{
  max-width:95%;
  max-height:95%;
}
</style>
</head>

<body>

<div id="countryName" class="country-name"></div>

<div class="categories">
  <button onclick="selectCategory(this,'سيارات')">🚗 سيارات</button>
  <button onclick="selectCategory(this,'عقارات')">🏢 عقارات</button>
  <button onclick="selectCategory(this,'وظائف')">🧑‍💼 وظائف</button>
  <button onclick="selectCategory(this,'إلكترونيات')">📱 إلكترونيات</button>
  <button onclick="selectCategory(this,'تجارة')">🛒 تجارة</button>
</div>

<div class="states" id="statesBox" style="display:none;"></div>
<div class="products" id="products"></div>

<button class="add-product-fab" onclick="goAddProduct()">+</button>

<div class="bottom-nav">
  <button onclick="go('products.html')">🏠<br>الرئيسية</button>
  <button onclick="go('account.html')">👤<br>الحساب</button>
  <button onclick="go('settings.html')">⚙️<br>الإعدادات</button>
</div>

<div class="image-viewer" id="imageViewer" onclick="this.style.display='none'">
  <img id="viewerImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3hAvhSDs-lX7ORCOR0DODT3l_S_gJA2o",
  authDomain: "arshi-market.firebaseapp.com",
  projectId: "arshi-market",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let country = "";
let currentCategory = "";
let currentState = "";
let unsubscribe = null;

const statesByCountry = {
  "السودان":[
    "الخرطوم","الجزيرة","نهر النيل","البحر الأحمر","كسلا","القضارف",
    "سنار","النيل الأبيض","شمال كردفان","جنوب كردفان","غرب كردفان",
    "شمال دارفور","جنوب دارفور","غرب دارفور","وسط دارفور","شرق دارفور",
    "الشمالية","النيل الأزرق"
  ]
};

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    console.log("المستخدم غير مسجل دخول");
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists()) return;

  country = snap.data().country || "السودان";
  document.getElementById("countryName").innerText = "📍 الدولة: " + country;

  loadStates();
});

window.selectCategory=(btn,cat)=>{
  document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentCategory = cat;
  loadStates();
};

function loadStates(){
  const statesBox = document.getElementById("statesBox");
  statesBox.style.display="flex";
  statesBox.innerHTML="";
  (statesByCountry[country] || []).forEach((s,i)=>{
    const b=document.createElement("button");
    b.textContent=s;
    b.onclick=()=>{
      document.querySelectorAll(".states button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      currentState=s;
      loadProducts();
    };
    if(i===0){ currentState=s; b.classList.add("active"); }
    statesBox.appendChild(b);
  });
  loadProducts();
}

/* ✅ تم تعديلها لعرض الرابط كما هو بدون توليد */
function fixImageUrl(img){
  if(!img) return "";
  return img; // فقط يرجع الرابط كما هو محفوظ في Firestore
}

function loadProducts(){
  if(!country || !currentCategory || !currentState) return;

  const box=document.getElementById("products");
  box.innerHTML="⏳ جاري التحميل...";
  if(unsubscribe) unsubscribe();

  const q=query(
    collection(db,"products"),
    where("country","==",country),
    where("category","==",currentCategory),
    where("city","==",currentState)
  );

  unsubscribe = onSnapshot(q,snap=>{
    box.innerHTML="";

    if(snap.empty){
      box.innerHTML="😢 لا توجد منتجات حالياً";
      return;
    }

    snap.forEach(docSnap=>{
      const p=docSnap.data();
      const cleanNumber = (p.whatsapp || "").replace(/\D/g,"");
      const message = encodeURIComponent(
        "مرحبًا 👋\nأرغب في الاستفسار عن المنتج:\n" + p.title
      );
      const whatsappLink = `https://wa.me/${cleanNumber}?text=${message}`;

      const imagesHtml = (p.images||[])
        .slice(0,3)
        .map(img=>{
          const fixed = fixImageUrl(img);
          return `<img src="${fixed}" onclick="viewImage('${fixed}')">`;
        })
        .join("");

      box.innerHTML+=`
      <div class="product-card">
        <div class="product-images">
          ${imagesHtml}
        </div>
        <b>${p.title}</b>
        <div class="price">${p.price}</div>
        <div class="product-info">
          📂 ${p.category}<br>
          📍 ${p.city}
        </div>
        <div class="whatsapp-number">
          📞 ${p.whatsapp || "غير متوفر"}
        </div>
        ${p.whatsapp ? `<button class="whatsapp-btn" onclick="window.open('${whatsappLink}','_blank')">💬 تواصل عبر واتساب</button>` : ""}
      </div>`;
    });
  });
}

window.viewImage=(src)=>{
  document.getElementById("viewerImg").src=src;
  document.getElementById("imageViewer").style.display="flex";
};

window.go=p=>location.href=p;
window.goAddProduct=()=>location.href="add-product.html";

</script>
</body>
</html>
