<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Arshi Market</title>

<style>

body{
font-family:Arial;
margin:0;
padding-bottom:80px;
background:#f5f5f5;
}

.country-name{
background:#4CAF50;
color:#fff;
text-align:center;
padding:8px;
font-weight:bold;
}

.categories,.states{
display:flex;
gap:8px;
padding:10px;
background:#fff;
overflow-x:auto;
}

.categories button,.states button{
border:none;
background:#eee;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.active{
background:#4CAF50!important;
color:#fff;
}

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product-card{
background:#fff;
padding:8px;
border-radius:10px;
}

.product-images{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
}

.product-images img{
width:100%;
height:85px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
}

.price{
color:#4CAF50;
font-weight:bold;
}

.product-info{
font-size:13px;
color:#555;
margin-top:4px;
}

.whatsapp-btn{
margin-top:6px;
background:#25D366;
color:#fff;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
border-top:1px solid #ccc;
}

.add-product-fab{
position:fixed;
bottom:90px;
left:20px;
background:#4CAF50;
color:#fff;
border:none;
width:55px;
height:55px;
border-radius:50%;
font-size:28px;
cursor:pointer;
}

/* عارض الصور */

.image-viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.image-viewer img{
max-width:95%;
max-height:95%;
object-fit:contain;
}

.close-viewer{
position:absolute;
top:20px;
right:25px;
color:white;
font-size:35px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="countryName" class="country-name"></div>

<div class="categories">
<button onclick="selectCategory(this,'سيارات')">🚗 سيارات</button>
<button onclick="selectCategory(this,'عقارات')">🏢 عقارات</button>
<button onclick="selectCategory(this,'وظائف')">💼 وظائف</button>
<button onclick="selectCategory(this,'إلكترونيات')">📱 إلكترونيات</button>
<button onclick="selectCategory(this,'تجارة')">🛒 تجارة</button>
</div>

<div id="statesBox" class="states"></div>
<div id="products" class="products"></div>

<button class="add-product-fab" onclick="goAddProduct()">+</button>

<div class="bottom-nav">
<button onclick="go('products.html')">🏠</button>
<button onclick="go('account.html')">👤</button>
<button onclick="go('settings.html')">⚙️</button>
</div>

<!-- عارض الصورة -->

<div class="image-viewer" id="imageViewer">
<span class="close-viewer" onclick="closeViewer()">×</span>
<img id="viewerImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyD3hAvhSDs-lX7ORCOR0DODT3l_S_gJA2o",
authDomain:"arshi-market.firebaseapp.com",
projectId:"arshi-market"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let country="";
let currentCategory="";
let currentState="";
let unsubscribe=null;

const statesByCountry={
"السودان":[
"الخرطوم","الجزيرة","نهر النيل","البحر الأحمر",
"كسلا","القضارف","سنار","النيل الأبيض",
"شمال كردفان","جنوب كردفان","غرب كردفان",
"شمال دارفور","جنوب دارفور","غرب دارفور",
"وسط دارفور","شرق دارفور","الشمالية","النيل الأزرق"
]
};

onAuthStateChanged(auth,async(user)=>{

if(!user) return;

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()) return;

country=snap.data().country || "السودان";

document.getElementById("countryName").innerText="📍 الدولة: "+country;

loadStates();

});

window.selectCategory=(btn,cat)=>{

document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

currentCategory=cat;

loadStates();

};

function loadStates(){

const box=document.getElementById("statesBox");

box.innerHTML="";

(statesByCountry[country]||[]).forEach((s,i)=>{

const b=document.createElement("button");

b.textContent=s;

b.onclick=()=>{

document.querySelectorAll(".states button").forEach(x=>x.classList.remove("active"));

b.classList.add("active");

currentState=s;

loadProducts();

};

if(i===0){

currentState=s;

b.classList.add("active");

}

box.appendChild(b);

});

loadProducts();

}

function loadProducts(){

if(!currentCategory || !currentState) return;

const box=document.getElementById("products");

box.innerHTML="⏳ جاري التحميل...";

if(unsubscribe) unsubscribe();

const q=query(
collection(db,"products"),
where("category","==",currentCategory),
where("city","==",currentState)
);

unsubscribe=onSnapshot(q,snap=>{

box.innerHTML="";

if(snap.empty){

box.innerHTML="😢 لا توجد منتجات";

return;

}

snap.forEach(docSnap=>{

const p=docSnap.data();

let images=Array.isArray(p.images)?p.images:[];

let imagesHtml="";

if(images.length){

imagesHtml=images.slice(0,3).map(img=>`
<img src="${img}" onclick="openViewer('${img}')">
`).join("");

}else{

imagesHtml=`<img src="https://via.placeholder.com/300x200?text=No+Image">`;

}

const cleanNumber=(p.whatsapp||"").replace(/\D/g,"");

const message=encodeURIComponent("مرحبًا 👋\nأرغب في الاستفسار عن المنتج:\n"+p.title);

const whatsappLink=`https://wa.me/${cleanNumber}?text=${message}`;

box.innerHTML+=`

<div class="product-card">

<div class="product-images">

${imagesHtml}

</div>

<b>${p.title}</b>

<div class="price">${p.price}</div>

<div class="product-info">

📂 ${p.category}<br>

📍 ${p.city}

</div>

${p.whatsapp?`<button class="whatsapp-btn" onclick="window.open('${whatsappLink}','_blank')">💬 تواصل عبر واتساب</button>`:""}

</div>

`;

});

});

}

window.openViewer=(src)=>{

document.getElementById("viewerImg").src=src;

document.getElementById("imageViewer").style.display="flex";

}

window.closeViewer=()=>{

document.getElementById("imageViewer").style.display="none";

}

window.go=p=>location.href=p;

window.goAddProduct=()=>location.href="add-product.html";

</script>

</body>
</html>
