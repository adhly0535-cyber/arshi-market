<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إضافة منتج</title>

<script>
UPLOADCARE_PUBLIC_KEY = "3ebd7495cde73c075c2e";
</script>
<script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:10px;
}
input, textarea, button, select{
  width:100%;
  margin:6px 0;
  padding:10px;
  font-size:14px;
}
button{
  background:#4CAF50;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button:disabled{
  background:#999;
}
.success-box{
  background:#1e1e1e;
  color:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
  margin-top:15px;
  display:none;
}
</style>
</head>

<body>

<h3>إضافة منتج</h3>

<form id="productForm" onsubmit="return false;">

<select id="typeSelect" required>
  <option value="">اختر نوع المنتج</option>
  <option value="سيارات">سيارات</option>
  <option value="عقارات">عقارات</option>
  <option value="وظائف">وظائف</option>
  <option value="هواتف">هواتف</option>
  <option value="لابتوبات">لابتوبات</option>
</select>

<select id="city" required>
  <option value="">اختر الولاية / المدينة</option>
</select>

<input id="title" placeholder="عنوان الإعلان" required>
<input id="price" placeholder="السعر" required>

<select id="stateInput" required>
  <option value="">الحالة</option>
  <option value="جديد">جديد</option>
  <option value="مستعمل">مستعمل</option>
</select>

<input id="whatsapp" placeholder="رقم واتساب (249XXXXXXXXX)" required>

<!-- رفع الصور -->
<input
  role="uploadcare-uploader"
  data-public-key="3ebd7495cde73c075c2e"
  data-multiple="true"
  data-images-only="true"
  data-max-files="3"
  data-clearable="true"
/>

<div id="extraFields"></div>

<textarea id="desc" placeholder="وصف المنتج" required></textarea>

<button type="button" id="publishBtn">📤 نشر المنتج</button>

</form>

<div class="success-box" id="successBox">
  ✅ تم نشر المنتج بنجاح
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3hAvhSDs-lX7ORCOR0DODT3l_S_gJA2o",
  authDomain: "arshi-market.firebaseapp.com",
  projectId: "arshi-market",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const citySelect = document.getElementById("city");
const typeSelect = document.getElementById("typeSelect");
const extra = document.getElementById("extraFields");
const publishBtn = document.getElementById("publishBtn");
const successBox = document.getElementById("successBox");

let country = "";
let uploadedImages = [];

const widget = uploadcare.Widget('[role=uploadcare-uploader]');

widget.onUploadComplete(function(info){

  uploadedImages = [];

  if(info.isGroup){

    info.files().forEach(function(file){

      file.done(function(fileInfo){
        uploadedImages.push(fileInfo.cdnUrl);
      });

    });

  }else{
    uploadedImages.push(info.cdnUrl);
  }

});

/* الولايات السودان */
const statesByCountry = {
  "السودان":[ "الخرطوم","الجزيرة","نهر النيل","البحر الأحمر","كسلا","القضارف",
  "سنار","النيل الأبيض","شمال كردفان","جنوب كردفان","غرب كردفان","شمال دارفور",
  "جنوب دارفور","غرب دارفور","وسط دارفور","شرق دارفور","الشمالية","النيل الأزرق"]
};

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  if(snap.exists()){
    country = snap.data().country || "السودان";
    citySelect.innerHTML = `<option value="">اختر الولاية / المدينة</option>`;
    (statesByCountry[country]||[]).forEach(c=>{
      const o = document.createElement("option");
      o.value = c;
      o.textContent = c;
      citySelect.appendChild(o);
    });
  }
});

/* الحقول حسب النوع */
typeSelect.addEventListener("change", ()=>{
  extra.innerHTML = "";
  if(typeSelect.value === "سيارات"){
    extra.innerHTML = `<input id="model" placeholder="الموديل">`;
  }
  if(typeSelect.value === "عقارات"){
    extra.innerHTML = `<input id="rooms" placeholder="عدد الغرف"><input id="area" placeholder="المساحة بالمتر">`;
  }
  if(typeSelect.value === "وظائف"){
    extra.innerHTML = `<input id="salary" placeholder="الراتب">`;
  }
  if(typeSelect.value === "هواتف" || typeSelect.value === "لابتوبات"){
    extra.innerHTML = `<input id="brand" placeholder="الشركة">`;
  }
});

/* نشر المنتج */
publishBtn.addEventListener("click", async ()=>{

  const user = auth.currentUser;

  if(!user){
    alert("يجب تسجيل الدخول");
    return;
  }

  if(uploadedImages.length === 0){
    alert("يرجى إضافة صورة واحدة على الأقل");
    return;
  }

  publishBtn.disabled = true;
  publishBtn.innerText = "جاري النشر...";

  try{

    const selectedCity = document.getElementById("city").value;
    const selectedCategory = typeSelect.value;

    await addDoc(collection(db,"products"),{
      title: document.getElementById("title").value,
      price: document.getElementById("price").value,
      desc: document.getElementById("desc").value,
      state: document.getElementById("stateInput").value,
      city: selectedCity,
      category: selectedCategory,
      country: country,
      whatsapp: document.getElementById("whatsapp").value,
      model: document.getElementById("model")?.value || "",
      rooms: document.getElementById("rooms")?.value || "",
      area: document.getElementById("area")?.value || "",
      salary: document.getElementById("salary")?.value || "",
      brand: document.getElementById("brand")?.value || "",
      images: uploadedImages,
      userId: user.uid,
      createdAt: serverTimestamp()
    });

    successBox.style.display = "block";
    publishBtn.innerText = "✅ تم النشر";
    uploadedImages = [];

    setTimeout(()=>{
      window.location.href = `products.html?category=${encodeURIComponent(selectedCategory)}&city=${encodeURIComponent(selectedCity)}`;
    },1500);

  }catch(error){
    alert("حدث خطأ أثناء النشر");
    console.error(error);
    publishBtn.disabled = false;
    publishBtn.innerText = "📤 نشر المنتج";
  }
});

</script>
</body>
  </html>
